[build.env]
passthrough = [
    "STARAI_GITHUB_TOKEN",
    "STARAI_GITHUB_TOKEN_FALLBACK_1",
    "STARAI_GITHUB_TOKEN_FALLBACK_2",
    "STARAI_GITHUB_TOKEN_FALLBACK_3",
    "STARAI_XUNFEI_APP_ID",
    "STARAI_XUNFEI_API_KEY",
    "STARAI_XUNFEI_API_SECRET",
    "STARAI_AGNES_API_KEY",
]

