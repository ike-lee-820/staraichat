<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "AppRegular", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 19px;
    line-height: 1.6;
    background: transparent;
    color: #222;
    overflow-y: auto;
  }
  #messages {
    display: flex;
    flex-direction: column;
    padding: 12px;
  }
  .msg {
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
  }
  .bubble {
    max-width: 85%;
    padding: 12px 14px;
    border-radius: 12px;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .user {
    align-self: flex-end;
    background: #c8e6ff;
    border-bottom-right-radius: 4px;
  }
  .assistant {
    align-self: flex-start;
    background: #f2f2f2;
    border-bottom-left-radius: 4px;
  }
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .user-actions {
    justify-content: flex-end;
    padding-right: 4px;
  }
  .assistant-actions {
    justify-content: flex-start;
    padding-left: 4px;
  }
  .actions button {
    font-size: 14px;
    padding: 4px 10px;
    border: none;
    border-radius: 6px;
    background: #e0e0e0;
    cursor: pointer;
  }
  .actions button:hover {
    background: #d0d0d0;
  }
  .attachment {
    margin-top: 10px;
  }
  .attachment img {
    display: block;
  }
  .attachment-actions {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }
  .attachment-actions button {
    font-size: 14px;
    padding: 4px 10px;
    border: none;
    border-radius: 6px;
    background: #e0e0e0;
    cursor: pointer;
  }
  b, strong, th, h1, h2, h3, h4, h5, h6 {
    font-family: "AppBold", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  pre, code {
    font-family: "AppCode", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 16px;
  }
  pre {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
  }
  code {
    background: #f0f0f0;
    padding: 2px 4px;
    border-radius: 4px;
  }
  blockquote {
    margin: 8px 0;
    padding-left: 12px;
    border-left: 4px solid #ccc;
    color: #555;
  }
  .math-display {
    overflow-x: auto;
    margin: 8px 0;
  }
</style>
</head>
<body>
<div id="messages"></div>
<script>
function setContent(html) {
  const container = document.getElementById('messages');
  container.innerHTML = html;
  renderMath();
}

function renderMath() {
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      throwOnError: false
    });
  }
}

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => {});
  }
  sendAction('copy', '', 0, text);
}

function sendAction(action, convId, idx, content) {
  const payload = { action: action, convId: convId, idx: idx };
  if (content !== undefined) payload.content = content;
  window.ipc.postMessage(JSON.stringify(payload));
}

function sendAttachmentAction(action, kind, fileName, localPath) {
  window.ipc.postMessage(JSON.stringify({
    action: action,
    kind: kind,
    fileName: fileName,
    localPath: localPath
  }));
}
</script>
</body>
</html>
